name: Build Desktop

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            platform: linux
            arch: x64
          - os: macos-latest
            target: macos
            platform: macos
            arch: universal
          - os: windows-latest
            target: windows
            platform: windows
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        shell: bash
        run: echo "describe=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev

      - name: Fetch flasher binaries
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="$(tr -d '[:space:]' < assets/tools/FLASHER_VERSION)"
          echo "Fetching librescoot-flasher $TAG into assets/tools/"
          cd assets/tools
          # Host flasher for this target + linux-arm (always, for on-device MDB flash)
          case "${{ matrix.target }}" in
            macos)      HOST_ASSET=librescoot-flasher-darwin-arm64 ;;
            linux-x64)  HOST_ASSET=librescoot-flasher-linux-amd64 ;;
            windows)    HOST_ASSET=librescoot-flasher-windows-amd64.exe ;;
          esac
          gh release download "$TAG" --repo librescoot/librescoot-flasher \
            --pattern "$HOST_ASSET" \
            --pattern librescoot-flasher-linux-arm
          chmod +x librescoot-flasher-*
          # Drop tooling that isn't used by this target
          if [ "${{ matrix.target }}" != "windows" ]; then
            rm -f dd.exe
          fi

      - name: Import signing certificate
        if: matrix.target == 'macos'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PWD: ${{ secrets.MACOS_KEYCHAIN_PWD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$MACOS_CERTIFICATE" | base64 -d > "$CERT_PATH"
          security create-keychain -p "$MACOS_KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          rm "$CERT_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build macOS
        if: matrix.target == 'macos'
        run: flutter build macos --release --dart-define=AUTH_KEY=${{ secrets.AUTH_KEY }} --dart-define=APP_VERSION=${{ steps.version.outputs.describe }}

      - name: Build Linux
        if: runner.os == 'Linux'
        run: flutter build linux --release --dart-define=AUTH_KEY=${{ secrets.AUTH_KEY }} --dart-define=APP_VERSION=${{ steps.version.outputs.describe }}

      - name: Build Windows
        if: matrix.target == 'windows'
        run: flutter build windows --release --dart-define=AUTH_KEY=${{ secrets.AUTH_KEY }} --dart-define=APP_VERSION=${{ steps.version.outputs.describe }}

      - name: Sign macOS app
        if: matrix.target == 'macos'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP="build/macos/Build/Products/Release/Librescoot Installer.app"
          IDENTITY="Developer ID Application: Starsong GmbH ($APPLE_TEAM_ID)"
          ENTITLEMENTS="macos/Runner/Release.entitlements"

          # Sign every Mach-O inside the bundle bottom-up (dylibs, frameworks,
          # nested helpers, bundled flasher binary). Non-Mach-O files (e.g. the
          # linux-arm flasher) are skipped — notarization only checks Mach-O.
          find "$APP" -type f | while read -r f; do
            if file "$f" | grep -q "Mach-O"; then
              codesign --force --options runtime --timestamp \
                --sign "$IDENTITY" "$f"
            fi
          done

          # Sign frameworks (directory bundles)
          if [ -d "$APP/Contents/Frameworks" ]; then
            find "$APP/Contents/Frameworks" -maxdepth 1 -name '*.framework' | while read -r fw; do
              codesign --force --options runtime --timestamp \
                --sign "$IDENTITY" "$fw"
            done
          fi

          # Sign the app bundle itself with entitlements
          codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" \
            --sign "$IDENTITY" \
            "$APP"

          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Package macOS (DMG)
        if: matrix.target == 'macos'
        run: |
          VERSION="${{ steps.version.outputs.describe }}"
          DMG_DIR=$(mktemp -d)
          cp -R "build/macos/Build/Products/Release/Librescoot Installer.app" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "Librescoot Installer" \
            -srcfolder "$DMG_DIR" \
            -ov -format UDZO \
            "build/macos/Build/Products/Release/librescoot-installer-macos-universal-${VERSION}.dmg"
          rm -rf "$DMG_DIR"

      - name: Notarize and staple DMG
        if: matrix.target == 'macos'
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY" | base64 -d > "$KEY_PATH"

          DMG=$(ls build/macos/Build/Products/Release/librescoot-installer-macos-*.dmg)
          echo "Notarizing $DMG"

          xcrun notarytool submit "$DMG" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait

          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

          rm "$KEY_PATH"

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          cd build/linux/x64/release
          mv bundle librescoot-installer
          tar czf librescoot-installer-linux-x64-${{ steps.version.outputs.describe }}.tar.gz librescoot-installer/

      - name: Package Windows
        if: matrix.target == 'windows'
        shell: bash
        run: |
          cd build/windows/x64/runner
          mv Release librescoot-installer
          7z a librescoot-installer-windows-x64-${{ steps.version.outputs.describe }}.zip librescoot-installer/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: librescoot-installer-${{ matrix.platform }}-${{ matrix.arch }}-${{ steps.version.outputs.describe }}
          path: |
            build/macos/Build/Products/Release/librescoot-installer-*.dmg
            build/linux/x64/release/librescoot-installer-*.tar.gz
            build/windows/x64/runner/librescoot-installer-*.zip
          if-no-files-found: error

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p dist/
          find artifacts/ -type f \( -name '*.dmg' -o -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} dist/ \;
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true

      - name: Generate app token for site rebuilds
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: librescoot
          repositories: downloads.librescoot.org,librescoot.github.io

      - name: Trigger downloads site rebuild
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: librescoot/downloads.librescoot.org
          event-type: releases-changed

      - name: Trigger main site rebuild
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: librescoot/librescoot.github.io
          event-type: releases-changed
