name: Build Desktop

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: macos
          - os: windows-latest
            target: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev

      - name: Build macOS
        if: matrix.target == 'macos'
        run: flutter build macos --release --dart-define=AUTH_KEY=${{ secrets.AUTH_KEY }}

      - name: Build Linux
        if: runner.os == 'Linux'
        run: flutter build linux --release --dart-define=AUTH_KEY=${{ secrets.AUTH_KEY }}

      - name: Build Windows
        if: matrix.target == 'windows'
        run: flutter build windows --release --dart-define=AUTH_KEY=${{ secrets.AUTH_KEY }}

      - name: Package macOS app
        if: matrix.target == 'macos'
        run: |
          cd build/macos/Build/Products/Release
          tar czf librescoot-installer-macos.tar.gz librescoot_installer.app

      - name: Upload macOS artifact
        if: matrix.target == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: librescoot-installer-macos
          path: build/macos/Build/Products/Release/librescoot-installer-macos.tar.gz
          if-no-files-found: error

      - name: Upload Windows artifact
        if: matrix.target == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: librescoot-installer-windows
          path: build/windows/x64/runner/Release
          if-no-files-found: error

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: librescoot-installer-linux
          path: build/linux/x64/release/bundle
          if-no-files-found: error
