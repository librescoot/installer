name: Build Desktop

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            platform: linux
            arch: x64
          - os: macos-latest
            target: macos
            platform: macos
            arch: universal
          - os: windows-latest
            target: windows
            platform: windows
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        shell: bash
        run: echo "describe=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev

      - name: Remove other platforms' flasher binaries
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "macos" ]; then
            rm -f assets/tools/librescoot-flasher-arm assets/tools/librescoot-flasher.exe assets/tools/dd.exe
          elif [ "${{ matrix.target }}" = "linux-x64" ]; then
            rm -f assets/tools/librescoot-flasher.exe assets/tools/dd.exe
          elif [ "${{ matrix.target }}" = "windows" ]; then
            rm -f assets/tools/librescoot-flasher assets/tools/librescoot-flasher-arm
          fi

      - name: Build macOS
        if: matrix.target == 'macos'
        run: flutter build macos --release --dart-define=AUTH_KEY=${{ secrets.AUTH_KEY }}

      - name: Build Linux
        if: runner.os == 'Linux'
        run: flutter build linux --release --dart-define=AUTH_KEY=${{ secrets.AUTH_KEY }}

      - name: Build Windows
        if: matrix.target == 'windows'
        run: flutter build windows --release --dart-define=AUTH_KEY=${{ secrets.AUTH_KEY }}

      - name: Package macOS (DMG)
        if: matrix.target == 'macos'
        run: |
          VERSION="${{ steps.version.outputs.describe }}"
          DMG_DIR=$(mktemp -d)
          cp -R "build/macos/Build/Products/Release/LibreScoot Installer.app" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "LibreScoot Installer" \
            -srcfolder "$DMG_DIR" \
            -ov -format UDZO \
            "build/macos/Build/Products/Release/librescoot-installer-macos-universal-${VERSION}.dmg"
          rm -rf "$DMG_DIR"

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          cd build/linux/x64/release
          mv bundle librescoot-installer
          tar czf librescoot-installer-linux-x64-${{ steps.version.outputs.describe }}.tar.gz librescoot-installer/

      - name: Package Windows
        if: matrix.target == 'windows'
        shell: bash
        run: |
          cd build/windows/x64/runner
          mv Release librescoot-installer
          7z a librescoot-installer-windows-x64-${{ steps.version.outputs.describe }}.zip librescoot-installer/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: librescoot-installer-${{ matrix.platform }}-${{ matrix.arch }}-${{ steps.version.outputs.describe }}
          path: |
            build/macos/Build/Products/Release/librescoot-installer-*.dmg
            build/linux/x64/release/librescoot-installer-*.tar.gz
            build/windows/x64/runner/librescoot-installer-*.zip
          if-no-files-found: error

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p dist/
          find artifacts/ -type f \( -name '*.dmg' -o -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} dist/ \;
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
