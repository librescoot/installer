name: Build Desktop

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            platform: linux
            arch: x64
          - os: macos-latest
            target: macos
            platform: macos
            arch: universal
          - os: windows-latest
            target: windows
            platform: windows
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        shell: bash
        run: echo "describe=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev

      - name: Build macOS
        if: matrix.target == 'macos'
        run: flutter build macos --release --dart-define=AUTH_KEY=${{ secrets.AUTH_KEY }}

      - name: Build Linux
        if: runner.os == 'Linux'
        run: flutter build linux --release --dart-define=AUTH_KEY=${{ secrets.AUTH_KEY }}

      - name: Build Windows
        if: matrix.target == 'windows'
        run: flutter build windows --release --dart-define=AUTH_KEY=${{ secrets.AUTH_KEY }}

      - name: Package macOS app
        if: matrix.target == 'macos'
        run: |
          cd build/macos/Build/Products/Release
          tar czf librescoot-installer-${{ matrix.platform }}-${{ matrix.arch }}-${{ steps.version.outputs.describe }}.tar.gz librescoot_installer.app

      - name: Package Linux app
        if: runner.os == 'Linux'
        run: |
          cd build/linux/x64/release
          tar czf librescoot-installer-${{ matrix.platform }}-${{ matrix.arch }}-${{ steps.version.outputs.describe }}.tar.gz bundle/

      - name: Package Windows app
        if: matrix.target == 'windows'
        shell: bash
        run: |
          cd build/windows/x64/runner
          7z a librescoot-installer-${{ matrix.platform }}-${{ matrix.arch }}-${{ steps.version.outputs.describe }}.zip Release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: librescoot-installer-${{ matrix.platform }}-${{ matrix.arch }}-${{ steps.version.outputs.describe }}
          path: |
            build/macos/Build/Products/Release/librescoot-installer-*.tar.gz
            build/linux/x64/release/librescoot-installer-*.tar.gz
            build/windows/x64/runner/librescoot-installer-*.zip
          if-no-files-found: error

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: find dist/ -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
