name: Build CLI Installer

on:
  push:
    branches: [main, feat/cli-installer]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "describe=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: cli/go.sum

      - name: Build all platforms
        working-directory: cli
        run: make build-all

      - name: Rename binaries with version
        working-directory: cli/bin
        run: |
          VERSION="${{ steps.version.outputs.describe }}"
          for f in librescoot-install-*; do
            # Insert version: librescoot-install-linux-amd64 -> librescoot-install-linux-amd64-v0.3.2
            base="${f%.exe}"
            ext=""
            [[ "$f" == *.exe ]] && ext=".exe"
            mv "$f" "${base}-${VERSION}${ext}"
          done
          ls -la

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: librescoot-install-${{ steps.version.outputs.describe }}
          path: cli/bin/librescoot-install-*
          if-no-files-found: error

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
